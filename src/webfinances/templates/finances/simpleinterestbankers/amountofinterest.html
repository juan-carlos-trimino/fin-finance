{{ define "simpleinterestbankers-layout" }}

<!-- rhs-ui1 -->
<div id="rhs-ui1">
  <form action="/fin/simpleinterest/bankers" method="post" enctype="application/x-www-form-urlencoded">
    <input type="hidden" name="csrf_token" value="{{ .CsrfToken }}"/>
    <div class="cnt-grid">
      <label class="cnt-textbox" for="fd1-time">Time (n)</label>
      <input type="number" class="cnt-textcombo" id="fd1-time" name="fd1-time" value="{{ .Fd1Time }}"
        inputmode="numeric" step="any" maxlength="7" required/>
      <label class="cnt-textbox" for="fd1-tp">Time Period</label>
      <select class="cnt-select" id="fd1-tp" name="fd1-tp">
        <option class="text-combo" value="year"
         {{ if eq .Fd1TimePeriod "year" }} selected {{ end }}>Year(s)</option>
        <option class="text-combo" value="semiyear"
         {{ if eq .Fd1TimePeriod "semiyear" }} selected {{ end }}>Semiyear(s)</option>
        <option class="text-combo" value="quarter"
         {{ if eq .Fd1TimePeriod "quarter" }} selected {{ end }}>Quarter(s)</option>
        <option class="text-combo" value="month"
         {{ if eq .Fd1TimePeriod "month" }} selected {{ end }}>Month(s)</option>
        <option class="text-combo" value="week"
         {{ if eq .Fd1TimePeriod "week" }} selected {{ end }}>Week(s)</option>
        <option class="text-combo" value="day"
         {{ if eq .Fd1TimePeriod "day" }} selected {{ end }}>Day(s)</option>
      </select>
      <label class="cnt-textbox" for="fd1-interest">Interest (i %)</label>
      <input type="number" class="cnt-textcombo" id="fd1-interest" name="fd1-interest" value="{{ .Fd1Interest }}"
        inputmode="numeric" step="0.5" maxlength="7" required/>
      <label class="cnt-textbox" for="fd1-compound">Compounding Period</label>
      <select class="cnt-select" id="fd1-compound" name="fd1-compound">
        <option value="annually" {{ if eq .Fd1Compound "annually" }} selected {{ end }}>Annually</option>
        <option value="semiannually" {{if eq .Fd1Compound "semiannually"}} selected {{end}}>Semiannually</option>
        <option value="quarterly" {{ if eq .Fd1Compound "quarterly" }} selected {{ end }}>Quarterly</option>
        <option value="monthly" {{ if eq .Fd1Compound "monthly" }} selected {{end}}>Monthly</option>
        <option value="weekly" {{ if eq .Fd1Compound "weekly" }} selected {{ end }}>Weekly</option>
        <option value="daily" {{ if eq .Fd1Compound "daily" }} selected {{ end }}>Daily</option>
        <!-- <option value="continuously" {{if eq .Fd1Compound "continuously"}} selected {{end}}>Continuously</option> -->
      </select>
      <label class="cnt-textbox" for="fd1-pv">Present Value (PV)</label>
      <input type="number" class="cnt-textcombo" id="fd1-pv" name="fd1-pv" value="{{ .Fd1PV }}"
        inputmode="numeric" step="any" maxlength="7"/>
    </div>
    <div class="button-back-style">
      <button class="button" id="btcompute" name="compute" value="rhs-ui1" type="submit">
        Compute
      </button>
    </div>
  </form>
  <div>
    <hr size="4" width="50%" color="darkgreen"/>
    <p class="p-result">{{ .Fd1Result }}</p>
  </div>
</div>

{{ end }}
