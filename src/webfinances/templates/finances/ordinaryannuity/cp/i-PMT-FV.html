{{ define "oacompoundingperiods-layout" }}

<!-- rhs-ui3 -->
<div id="rhs-ui3">
  <form action="/fin/ordinaryannuity/cp" method="post" enctype="application/x-www-form-urlencoded">
    <input type="hidden" name="csrf_token" value="{{ .CsrfToken }}"/>
    <div class="cnt-grid">
      <label class="cnt-textbox" for="fd3-interest">Interest (%)</label>
      <input type="number" id="fd3-interest" name="fd3-interest" value="{{ .Fd3Interest }}" inputmode="numeric" step="0.5" maxlength="7" required/>
      <label class="cnt-textbox" for="fd3-cp">Compounding Period</label>
      <select class="cnt-select" id="fd3-cp" name="fd3-cp">
        <option value="annually" {{ if eq .Fd3Compound "annually" }} selected {{ end }}>Annually</option>
        <option value="semiannually" {{ if eq .Fd3Compound "semiannually" }} selected {{ end }}>Semiannually</option>
        <option value="quarterly" {{ if eq .Fd3Compound "quarterly" }} selected {{ end }}>Quarterly</option>
        <option value="monthly" {{ if eq .Fd3Compound "monthly" }} selected {{ end }}>Monthly</option>
        <option value="weekly" {{ if eq .Fd3Compound "weekly" }} selected {{ end }}>Weekly</option>
        <option value="daily" {{ if eq .Fd3Compound "daily" }} selected {{ end }}>Daily</option>
        <option value="continuously" {{ if eq .Fd3Compound "continuously" }} selected {{ end }}>Continuously</option>
      </select>
      <label class="cnt-textbox" for="fd3-payment">Payment</label>
      <input type="number" id="fd3-payment" name="fd3-payment" value="{{ .Fd3Payment }}" inputmode="numeric" step="any" maxlength="7" required/>
      <label class="cnt-textbox" for="fd3-fv">Future Value (FV)</label>
      <input type="number" id="fd3-fv" name="fd3-fv" value="{{ .Fd3FV }}" inputmode="numeric" step="any" maxlength="7" required/>
    </div>
    <div class="button-back-style">
      <button class="button" id="btcompute" name="compute" value="rhs-ui3" type="submit">
        Compute
      </button>
    </div>
  </form>
  <div>
    <hr size="4" width="50%" color="darkgreen"/>
    <p class="p-result">{{ .Fd3Result }}</p>
  </div>
</div>

{{ end }}
