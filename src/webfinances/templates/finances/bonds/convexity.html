{{ define "bonds-layout" }}

<!-- rhs-ui8 -->
<div id="rhs-ui8">
  <form action="/fin/bonds" method="post" enctype="application/x-www-form-urlencoded">
    <input type="hidden" name="csrf_token" value="{{ .CsrfToken }}"/>
    <div class="cnt-grid">
      <label class="cnt-textbox" for="fd8-facevalue">Face Value</label>
      <input class="cnt-textcombo" id="fd8-facevalue" name="fd8-facevalue" value="{{ .Fd8FaceValue }}"
        type="number" inputmode="numeric" step="any" maxlength="7" required/>
      <label class="cnt-textbox" for="fd8-time">Time</label>
      <input class="cnt-textcombo" id="fd8-time" name="fd8-time" value="{{ .Fd8Time }}" type="number"
        step="any" maxlength="7" required/>
      <label class="cnt-textbox" for="fd8-tp">Time Period</label>
      <select class="cnt-select" name="fd8-tp" id="fd8-tp">
        <option value="year" {{ if eq .Fd8TimePeriod "year" }} selected {{ end }}>Year(s)</option>
        <option value="semiyear" {{ if eq .Fd8TimePeriod "semiyear" }} selected {{ end }}>Semiyear(s)</option>
        <option value="quarter" {{ if eq .Fd8TimePeriod "quarter" }} selected {{ end }}>Quarter(s)</option>
        <option value="month" {{ if eq .Fd8TimePeriod "month" }} selected {{ end }}>Month(s)</option>
        <option value="week" {{ if eq .Fd8TimePeriod "week" }} selected {{ end }}>Week(s)</option>
      </select>
      <label class="cnt-textbox" for="fd8-coupon">Coupon Rate (%)</label>
      <input class="cnt-textcombo" id="fd8-coupon" name="fd8-coupon" value="{{ .Fd8Coupon }}"
        type="number" step="0.5" maxlength="7" required/>
      <label class="cnt-textbox" for="fd8-compound-coupon">Compounding Period</label>
      <select class="cnt-select" id="fd8-compound-coupon" name="fd8-compound-coupon">
        <option value="annually" {{ if eq .Fd8CompoundCoupon "annually" }} selected {{ end }}>Annually</option>
        <option value="semiannually" {{ if eq .Fd8CompoundCoupon "semiannually" }} selected {{ end }}>Semiannually</option>
        <option value="quarterly" {{ if eq .Fd8CompoundCoupon "quarterly" }} selected {{ end }}>Quarterly</option>
        <option value="monthly" {{ if eq .Fd8CompoundCoupon "monthly" }} selected {{ end }}>Monthly</option>
        <option value="weekly" {{ if eq .Fd8CompoundCoupon "weekly" }} selected {{ end }}>Weekly</option>
        <!-- <option value="continuously" {{ if eq .Fd8CompoundCoupon "continuously" }} selected {{ end }}>Continuously</option> -->
      </select>
      <label class="cnt-textbox" for="fd8-current">Current Interest (%)</label>
      <input class="cnt-textcombo" id="fd8-current" name="fd8-current" value="{{ .Fd8CurInterest }}"
        type="number" step="0.5" maxlength="7" required/>
      <label class="cnt-textbox">Compounding Period or</label><br>
      <label class="cnt-textbox" for="fd8-compound">Coupon Payment Frequency</label>
      <select class="cnt-select" id="fd8-compound" name="fd8-compound">
        <option value="annually" {{ if eq .Fd8Compound "annually" }} selected {{ end }}>Annually</option>
        <option value="semiannually" {{ if eq .Fd8Compound "semiannually" }} selected {{ end }}>Semiannually</option>
        <option value="quarterly" {{ if eq .Fd8Compound "quarterly" }} selected {{ end }}>Quarterly</option>
        <option value="monthly" {{ if eq .Fd8Compound "monthly" }} selected {{ end }}>Monthly</option>
        <option value="weekly" {{ if eq .Fd8Compound "weekly" }} selected {{ end }}>Weekly</option>
        <option value="continuously" {{ if eq .Fd8Compound "continuously" }} selected {{ end }}>Continuously</option>
      </select>
    </div>
    <div class="button-back-style">
      <button class="button" id="btcompute" name="compute" value="rhs-ui8" type="submit">
        Compute
      </button>
    </div>
  </form>
  <div>
    <hr size="4" width="50%" color="darkgreen"/>
    <p class="p-note">{{ index .Fd8Result 0 }}</p>
    <p class="p-result">{{ index .Fd8Result 1 }}</p>
  </div>
</div>

{{ end }}
