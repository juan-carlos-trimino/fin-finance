{{ define "bonds-layout" }}

<!-- rhs-ui4 -->
<div id="rhs-ui4">
  <form action="/fin/bonds" method="post" enctype="application/x-www-form-urlencoded">
    <input type="hidden" name="csrf_token" value="{{ .CsrfToken }}"/>
    <!-- margin: top, right, bottom, left -->
    <div class="cnt-grid">
      <label class="cnt-textbox" for="fd4-facevalue">Face Value</label>
      <input type="number" class="cnt-textcombo" id="fd4-facevalue" name="fd4-facevalue" value="{{ .Fd4FaceValue }}"
        inputmode="numeric" step="any" maxlength="7" required/>
      <label class="cnt-textbox" for="fd4-time">Time (n)</label>
      <input type="number" class="cnt-textcombo" id="fd4-time" name="fd4-time" value="{{ .Fd4Time }}"
        inputmode="numeric" step="any" maxlength="7" required/>
      <label class="cnt-textbox" for="fd4-tp">Time Period</label>
      <select class="cnt-select" name="fd4-tp" id="fd4-tp">
        <option value="year" {{ if eq .Fd4TimePeriod "year" }} selected {{ end }}>Year(s)</option>
        <option value="semiyear" {{ if eq .Fd4TimePeriod "semiyear" }} selected {{ end }}>Semiyear(s)</option>
        <option value="quarter" {{ if eq .Fd4TimePeriod "quarter" }} selected {{ end }}>Quarter(s)</option>
        <option value="month" {{ if eq .Fd4TimePeriod "month" }} selected {{ end }}>Month(s)</option>
        <option value="week" {{ if eq .Fd4TimePeriod "week" }} selected {{ end }}>Week(s)</option>
        <option value="day" {{ if eq .Fd4TimePeriod "day" }} selected {{ end }}>Day(s)</option>
      </select>
      <label class="cnt-textbox" for="fd4-coupon">Coupon Rate (%)</label>
      <input type="number" class="cnt-textcombo" id="fd4-coupon" name="fd4-coupon" value="{{ .Fd4Coupon }}"
        inputmode="numeric" step="0.5" maxlength="7" required/>
      <label class="cnt-textbox" for="fd4-compound">Compounding Period</label>
      <select class="cnt-select" id="fd4-compound" name="fd4-compound">
        <option value="annually" {{ if eq .Fd4Compound "annually" }} selected {{ end }}>Annually</option>
        <option value="semiannually" {{ if eq .Fd4Compound "semiannually" }} selected {{ end }}>Semiannually</option>
        <option value="quarterly" {{ if eq .Fd4Compound "quarterly" }} selected {{ end }}>Quarterly</option>
        <option value="monthly" {{ if eq .Fd4Compound "monthly" }} selected {{ end }}>Monthly</option>
        <option value="weekly" {{ if eq .Fd4Compound "weekly" }} selected {{ end }}>Weekly</option>
        <option value="daily" {{ if eq .Fd4Compound "daily" }} selected {{ end }}>Daily</option>
        <option value="continuously" {{ if eq .Fd4Compound "continuously" }} selected {{ end }}>Continuously</option>
      </select>
    </div>
    <div>
      <fieldset class="radio-fieldset">
        <legend class="radio-legend">Select Appropriate Choice</legend>
        <div>
          <input type="radio" id="fd4-curinterest" name="fd4-choice" value="fd4-curinterest"
            {{ if eq .Fd4CurrentRadio "fd4-curinterest" }} checked {{ end }}>
          <label class="radio-label" for="fd4-curinterest">
            Current Interest (%)
          </label><br>
          <label class="cnt-textbox" for="fd4-ci">Current Interest (%)</label>
          <input type="number" class="cnt-textcombo" id="fd4-ci" name="fd4-ci" value="{{ .Fd4CurInterest }}"
            inputmode="numeric" step="any" maxlength="7" required/><br>
          <input type="radio" id="fd4-bondprice" name="fd4-choice" value="fd4-bondprice"
            {{ if eq .Fd4CurrentRadio "fd4-bondprice" }} checked {{ end }}>
          <label class="radio-label" for="fd4-bondprice">
            Bond Price
          </label><br>
          <label class="cnt-textbox" for="fd4-bp">Bond Price</label>
          <input type="number" class="cnt-textcombo" id="fd4-bp" name="fd4-bp" value="{{ .Fd4BondPrice }}"
            inputmode="numeric" step="any" maxlength="7" required/>
        </div>
      </fieldset>
    </div>
    <div class="button-back-style">
      <button class="button" id="btcompute" name="compute" value="rhs-ui4" type="submit">
        Compute
      </button>
    </div>
  </form>
  <div>
    <hr size="4" width="50%" color="darkgreen"/>
    <p class="p-result">{{ index .Fd4Result 0 }}</p>
    <p class="p-result">{{ index .Fd4Result 1 }}</p>
  </div>
</div>

{{ end }}
