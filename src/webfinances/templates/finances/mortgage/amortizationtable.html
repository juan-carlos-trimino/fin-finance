<!-- rhs-ui2 -->
<div id="rhs-ui2">
  <form action="/fin/mortgage" method="POST" enctype="application/x-www-form-urlencoded">
    <input type="hidden" name="csrf_token" value="{{ .CsrfToken }}"/>
    <div class="cnt-grid">
      <label class="cnt-textbox" for="fd2-n">Time (n)</label>
      <input type="number" class="cnt-textcombo" id="fd2-n" name="fd2-n" value="{{ .Fd2N }}"
        inputmode="numeric" step="any" maxlength="7" required/>
      <label class="cnt-textbox" for="fd2-tp">Time Period</label>
      <select class="cnt-select" id="fd2-tp" name="fd2-tp">
        <option value="year" {{ if eq .Fd2TimePeriod "year" }} selected {{ end }}>Year(s)</option>
        <option value="semiyear" {{ if eq .Fd2TimePeriod "semiyear" }} selected {{ end }}>Semiyear(s)</option>
        <option value="quarter" {{ if eq .Fd2TimePeriod "quarter" }} selected {{ end }}>Quarter(s)</option>
        <option value="month" {{ if eq .Fd2TimePeriod "month" }} selected {{ end }}>Month(s)</option>
        <option value="week" {{ if eq .Fd2TimePeriod "week" }} selected {{ end }}>Week(s)</option>
        <option value="day" {{ if eq .Fd2TimePeriod "day" }} selected {{ end }}>Day(s)</option>
      </select>
      <label class="cnt-textbox" for="fd2-i">Interest (%)</label>
      <input type="number" class="cnt-textcombo" id="fd2-i" name="fd2-i" value="{{ .Fd2Interest }}"
        inputmode="numeric" step="0.5" maxlength="7" required/>
      <label class="cnt-textbox" for="fd2-compound">Compounding Period</label>
      <select class="cnt-select" id="fd2-compound" name="fd2-compound">
        <option value="annually" {{ if eq .Fd2Compound "annually" }} selected {{ end }}>Annually</option>
        <option value="semiannually" {{ if eq .Fd2Compound "semiannually" }} selected {{ end }}>Semiannually</option>
        <option value="quarterly" {{ if eq .Fd2Compound "quarterly" }} selected {{ end }}>Quarterly</option>
        <option value="monthly" {{ if eq .Fd2Compound "monthly" }} selected {{ end }}>Monthly</option>
        <option value="weekly" {{ if eq .Fd2Compound "weekly" }} selected {{ end }}>Weekly</option>
        <option value="daily" {{ if eq .Fd2Compound "daily" }} selected {{ end }}>Daily</option>
        <option value="continuously" {{ if eq .Fd2Compound "continuously" }} selected {{ end }}>Continuously</option>
      </select>
      <label class="cnt-textbox" for="fd2-amount">Amount</label>
      <input type="number" class="cnt-textcombo" id="fd2-amount" name="fd2-amount" value="{{ .Fd2Amount }}"
        inputmode="numeric" step="any" maxlength="7" required/>
    </div>
    <div class="button-back-style">
      <button class="button" id="btcompute" value="rhs-ui2" name="compute" type="submit">
        Compute
      </button>
    </div>
  </form>
  <div>
    <hr size="4" width="50%" color="darkgreen"/>
    <p class="p-result">{{ .Fd2TotalCost }}</p>
    <p class="p-result">{{ .Fd2TotalInterest }}</p>
    <table class="amortization-table-style" align="center">
      <caption>Amortization Table</caption>
      <thead>
        <tr>
          <th>Payment No.</th>
          <th>Payment</th>
          <th>Principal</th>
          <th>Interest</th>
          <th>Declining Balance</th>
        </tr>
      </thead>
      <tbody>
        {{ range .Fd2Result }}
        <tr> <!-- Row -->
          <td>{{ .PaymentNo }}</td> <!-- Data -->
          <td>{{ .Payment }}</td>
          <td>{{ .PmtPrincipal }}</td>
          <td>{{ .PmtInterest }}</td>
          <td>{{ .Balance }}</td>
        </tr>
        {{ end }}
      </tbody>
    </table>
  </div>
</div>

{{ end }}
