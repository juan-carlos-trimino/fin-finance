{{ define "admin-security-layout" }}

<!-- rhs-ui1 -->
<div id="rhs-ui1">
  <!--
  (1) Authentication credentials should be sent only through encrypted connections (HTTPS). An exception to the encrypted connection may
      be the temporary passwords associated with email resets.
  (2) Remember that requested URLs are usually logged by the HTTP server (access_log), which include the query string. To prevent
      authentication credentials leakage to HTTP server logs, data should be sent to the server using the HTTP POST method.
  (3) The "remember me" functionality should be disabled.
  (4) After a successful login, the user should be informed about the last successful or unsuccessful access date/time so that he can
      detect and report suspicious activity.
  (5) When handling authentication errors, the application should not disclose which part of the authentication data was incorrect. Instead
      of "Invalid username" or "Invalid password", just use "Invalid username and/or password" interchangeably.
  -->
  <form action="/admin/settings/security" method="POST" enctype="application/x-www-form-urlencoded" autocomplete="off">
    <input type="hidden" name="csrf_token" value="{{ .CsrfToken }}"/>
    <div class="cnt-grid">
      <!--
      The password entry should be obscured on the user's screen.
      -->
      <label class="cnt-textbox-red" for="oldpwd">Old Password</label>
      <input type="password" id="oldpwd" name="oldpwd" value="{{ .Old }}" autofocus required maxlength="256">
      <label class="cnt-textbox-red" for="newpwd">New Password</label>
      <input type="password" id="newpwd" name="newpwd" value="{{ .New }}" autofocus required maxlength="256">
      <label class="cnt-textbox-red" for="connewpwd">Confirm New Password</label>
      <input type="password" id="connewpwd" name="connewpwd" value="{{ .Confirm }}" autofocus required maxlength="256">
    </div>
    <div class="button-back-style">
      <button class="button" id="btcompute" value="rhs-ui1" name="compute" type="submit">Save</button>
    </div>
  </form>
  <div>
    <br><label class="p-result">{{ .ErrMsg }}</label>
  </div>
</div>

{{ end }}
